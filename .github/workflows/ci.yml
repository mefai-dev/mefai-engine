name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install core dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run ruff lint
        run: |
          ruff check src/ tests/ --select E,F,W,I --ignore E501,E741

      - name: Run pytest
        run: |
          python -m pytest tests/ -v --tb=short --cov=mefai_engine --cov-report=term-missing

      - name: Run mypy (allow failures)
        continue-on-error: true
        run: |
          mypy src/mefai_engine/ --ignore-missing-imports
