engine:
  mode: paper
  log_level: INFO
  symbols:
    - BTCUSDT

exchanges:
  binance:
    enabled: true
    testnet: true
  okx:
    enabled: false
  bybit:
    enabled: false

data:
  timeframes: ["1m", "5m", "15m", "1h", "4h", "1d"]
  orderbook_depth: 20
  history_days: 365

features:
  enabled:
    - rsi_14
    - macd_12_26_9
    - macd_line
    - macd_signal
    - bollinger_upper_20
    - bollinger_lower_20
    - bollinger_width_20
    - atr_14
    - adx_14
    - ema_10
    - ema_20
    - ema_50
    - sma_20
    - sma_50
    - sma_200
    - stoch_k_14
    - stoch_d_14
    - cci_20
    - williams_r_14
    - roc_10
    - mfi_14
    - obv
    - vwap
    - volume_sma_20
    - volume_ratio
    - accumulation_dist
    - chaikin_mf_20
    - force_index_13
    - historical_vol_20
    - book_imbalance
    - cvd
    - spread_bps
    - funding_rate
    - oi_change_pct
    - trend_strength
    - volatility_regime
    - mean_reversion_score
    - regime_label

models:
  gradient_boost:
    enabled: true
    retrain_interval_hours: 24
    lookback_window: 500
    n_estimators: 300
    max_depth: 6
    learning_rate: 0.05
  transformer:
    enabled: true
    model_path: models/tft_v1.pt
    sequence_length: 128
    d_model: 64
    n_heads: 4
    n_layers: 3
  rl:
    enabled: true
    model_path: models/ppo_v1.zip
    retrain_interval_hours: 168
  sentiment:
    enabled: true
    model_name: ProsusAI/finbert
    news_sources:
      - cryptopanic
      - rss

strategy:
  meta_learner:
    min_confidence: 0.65
    regime_filter: true
    max_signals_per_hour: 4

risk:
  max_position_pct: 10.0
  max_total_exposure_pct: 30.0
  max_daily_loss_pct: 3.0
  max_drawdown_pct: 10.0
  max_consecutive_losses: 5
  circuit_breaker_cooldown_seconds: 3600
  funding_rate_cost_cap_pct: 0.1

execution:
  default_algorithm: twap
  twap_duration_seconds: 120
  slippage_tolerance_bps: 10
  maker_fee_bps: 2
  taker_fee_bps: 5

database:
  # Set via environment variables: MEFAI__DATABASE__TIMESCALEDB_URL and MEFAI__DATABASE__REDIS_URL
  timescaledb_url: ""
  redis_url: ""

monitoring:
  telegram:
    enabled: false
  metrics_port: 9090

hpo:
  n_trials: 100
  timeout_seconds: 3600
  model_type: xgboost
  n_folds: 5
  train_size: 3000
  val_size: 1000

drift:
  psi_warning_threshold: 0.1
  psi_critical_threshold: 0.25
  ks_alpha: 0.05
  n_bins: 10
  check_interval_seconds: 3600

kelly:
  fraction: 0.25
  max_position_pct: 10.0
  min_win_rate: 0.4
  min_trades: 30
  confidence_scaling: true

correlation:
  rolling_window: 60
  btc_correlation_limit: 0.85
  max_correlated_exposure_pct: 40.0
  correlation_threshold: 0.7
  dcc_alpha: 0.01
  dcc_beta: 0.95

var:
  confidence_level: 0.99
  holding_period_days: 1
  monte_carlo_simulations: 10000
  lookback_days: 252
  max_var_pct: 5.0
  max_cvar_pct: 8.0

liquidity:
  min_depth_usdt: 50000.0
  max_spread_bps: 20.0
  max_slippage_bps: 10.0
  depth_levels: 20
  min_volume_24h_usdt: 1000000.0

tenant:
  max_tenants: 100
  api_key_prefix: "mefai_"
  api_key_length: 48
  default_plan: free

billing:
  # Set via environment: MEFAI__BILLING__STRIPE_API_KEY
  stripe_api_key: ""
  stripe_webhook_secret: ""

audit:
  max_memory_entries: 50000
  log_dir: logs/audit
  file_rotation_size_mb: 50
  max_files: 100
  write_to_file: true
