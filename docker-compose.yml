services:
  engine:
    build: .
    env_file: .env
    volumes:
      - ./configs:/app/configs
      - ./models:/app/models
    depends_on:
      timescaledb:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    ports:
      - "8080:8080"
      - "9090:9090"

  timescaledb:
    image: timescale/timescaledb:latest-pg16
    volumes:
      - tsdb_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: mefai_engine
      POSTGRES_USER: mefai
      POSTGRES_PASSWORD: ${DB_PASSWORD:-REDACTED_PASSWORD}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mefai -d mefai_engine"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: redis-server --maxmemory 512mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  tsdb_data:
